<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Live Translate</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f3f5ed;
        --muted: #858b80;
        --panel: #151714;
        --line: #292c27;
        --accent: #d9ff43;
        --danger: #ff695f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 20px;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 105% -15%, #344016 0, transparent 38%),
          #0b0c0a;
        font: 500 13px/1.35 "Avenir Next", Avenir, sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font: 700 16px/1 "Avenir Next Condensed", "DIN Alternate", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #monitor {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #monitor::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        content: "";
      }

      #monitor[data-state="active"] {
        color: var(--accent);
      }

      #monitor[data-state="loading"]::before {
        animation: pulse 1.1s ease-in-out infinite;
      }

      #monitor[data-state="error"] {
        color: var(--danger);
      }

      .field {
        display: block;
        margin-bottom: 14px;
      }

      .field span {
        display: block;
        margin: 0 0 6px 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 0 12px;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        outline: none;
        transition: border-color 140ms ease, background 140ms ease;
      }

      input:hover,
      select:hover {
        border-color: #3d423a;
      }

      input:focus-visible,
      select:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      input:disabled,
      select:disabled {
        opacity: 0.55;
      }

      #toggle {
        width: 100%;
        height: 46px;
        margin-top: 4px;
        border: 0;
        border-radius: 9px;
        color: #11130d;
        background: var(--accent);
        font: 800 12px/1 "Avenir Next", Avenir, sans-serif;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease, background 160ms ease;
      }

      #toggle:hover {
        filter: brightness(1.08);
      }

      #toggle:active {
        transform: translateY(1px);
      }

      #toggle.running {
        color: var(--ink);
        background: #292c27;
      }

      #toggle:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      #toggle:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 3px;
      }

      #status {
        min-height: 18px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }

      #status.error {
        color: var(--danger);
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Live Translate</h1>
      <div id="monitor" data-state="idle" role="status" aria-live="polite">Bereit</div>
    </header>

    <label class="field">
      <span>Zielsprache</span>
      <select id="targetLanguage">
        <option value="de">Deutsch</option>
        <option value="en">Englisch</option>
        <option value="es">Spanisch</option>
        <option value="fr">Französisch</option>
        <option value="it">Italienisch</option>
        <option value="pt-BR">Portugiesisch (Brasilien)</option>
        <option value="pt-PT">Portugiesisch (Portugal)</option>
        <option value="nl">Niederländisch</option>
        <option value="pl">Polnisch</option>
        <option value="tr">Türkisch</option>
        <option value="ru">Russisch</option>
        <option value="uk">Ukrainisch</option>
        <option value="ja">Japanisch</option>
        <option value="ko">Koreanisch</option>
        <option value="zh-Hans">Chinesisch (vereinfacht)</option>
        <option value="zh-Hant">Chinesisch (traditionell)</option>
        <option value="hi">Hindi</option>
        <option value="ar">Arabisch</option>
      </select>
    </label>

    <label class="field">
      <span>Gemini API-Key</span>
      <input type="password" id="geminiKey" placeholder="AIza…" autocomplete="off" />
    </label>

    <button id="toggle" type="button" aria-pressed="false">Start</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
