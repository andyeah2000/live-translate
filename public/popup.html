<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Live Translate</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f3f5ed;
        --muted: #858b80;
        --panel: #151714;
        --line: #292c27;
        --accent: #d9ff43;
        --danger: #ff695f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 20px;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 105% -15%, #344016 0, transparent 38%),
          #0b0c0a;
        font: 500 13px/1.35 "Avenir Next", Avenir, sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font: 700 16px/1 "Avenir Next Condensed", "DIN Alternate", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #monitor {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #monitor::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        content: "";
      }

      #monitor[data-state="active"] {
        color: var(--accent);
      }

      #monitor[data-state="loading"]::before {
        animation: pulse 1.1s ease-in-out infinite;
      }

      #monitor[data-state="error"] {
        color: var(--danger);
      }

      .field {
        display: block;
        margin-bottom: 14px;
      }

      .field span {
        display: block;
        margin: 0 0 6px 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input[type="password"],
      select {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 0 12px;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        outline: none;
        transition: border-color 140ms ease, background 140ms ease;
      }

      input[type="password"]:hover,
      select:hover {
        border-color: #3d423a;
      }

      input[type="password"]:focus-visible,
      select:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      input[type="password"]:disabled,
      select:disabled {
        opacity: 0.55;
      }

      .output {
        margin: 2px 0 14px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 13px 14px 14px;
        background: color-mix(in srgb, var(--panel) 86%, transparent);
      }

      .output-row,
      .volume-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .output-row {
        cursor: pointer;
      }

      .output-label,
      .volume-head {
        color: var(--ink);
        font-size: 12px;
        font-weight: 650;
      }

      .switch-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
      }

      .switch-track {
        position: relative;
        width: 38px;
        height: 22px;
        border: 1px solid #3b3f38;
        border-radius: 999px;
        background: #242720;
        transition: border-color 150ms ease, background 150ms ease;
      }

      .switch-track::after {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--muted);
        content: "";
        transition: transform 170ms cubic-bezier(0.2, 0.8, 0.2, 1), background 150ms ease;
      }

      .switch-input:checked + .switch-track {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 22%, #171a11);
      }

      .switch-input:checked + .switch-track::after {
        background: var(--accent);
        transform: translateX(16px);
      }

      .switch-input:focus-visible + .switch-track {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .volume {
        margin-top: 14px;
        padding-top: 13px;
        border-top: 1px solid var(--line);
      }

      #translationValue {
        color: var(--accent);
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      input[type="range"] {
        width: 100%;
        height: 18px;
        margin: 8px 0 0;
        padding: 0;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #45501f);
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        margin-top: -6px;
        border: 3px solid #11130e;
        border-radius: 50%;
        appearance: none;
        background: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }

      input[type="range"]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 4px;
      }

      #toggle {
        width: 100%;
        height: 46px;
        margin-top: 4px;
        border: 0;
        border-radius: 9px;
        color: #11130d;
        background: var(--accent);
        font: 800 12px/1 "Avenir Next", Avenir, sans-serif;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease, background 160ms ease;
      }

      #toggle:hover {
        filter: brightness(1.08);
      }

      #toggle:active {
        transform: translateY(1px);
      }

      #toggle.running {
        color: var(--ink);
        background: #292c27;
      }

      #toggle:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      #toggle:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 3px;
      }

      #status {
        min-height: 18px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }

      #status.error {
        color: var(--danger);
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Live Translate</h1>
      <div id="monitor" data-state="idle" role="status" aria-live="polite">Bereit</div>
    </header>

    <label class="field">
      <span>Zielsprache</span>
      <select id="targetLanguage">
        <option value="de">Deutsch</option>
        <option value="en">Englisch</option>
        <option value="es">Spanisch</option>
        <option value="fr">Französisch</option>
        <option value="it">Italienisch</option>
        <option value="pt-BR">Portugiesisch (Brasilien)</option>
        <option value="pt-PT">Portugiesisch (Portugal)</option>
        <option value="nl">Niederländisch</option>
        <option value="pl">Polnisch</option>
        <option value="tr">Türkisch</option>
        <option value="ru">Russisch</option>
        <option value="uk">Ukrainisch</option>
        <option value="ja">Japanisch</option>
        <option value="ko">Koreanisch</option>
        <option value="zh-Hans">Chinesisch (vereinfacht)</option>
        <option value="zh-Hant">Chinesisch (traditionell)</option>
        <option value="hi">Hindi</option>
        <option value="ar">Arabisch</option>
      </select>
    </label>

    <label class="field">
      <span>Gemini API-Key</span>
      <input type="password" id="geminiKey" placeholder="AIza…" autocomplete="off" />
    </label>

    <div class="output">
      <label class="output-row">
        <span class="output-label">Untertitel</span>
        <input class="switch-input" type="checkbox" id="subtitles" />
        <span class="switch-track" aria-hidden="true"></span>
      </label>
      <div class="volume">
        <div class="volume-head">
          <span>Gemini-Stimme</span>
          <strong id="translationValue">100%</strong>
        </div>
        <input
          type="range"
          id="translationVolume"
          min="0"
          max="100"
          step="5"
          aria-label="Lautstärke der Gemini-Stimme"
        />
      </div>
    </div>

    <button id="toggle" type="button" aria-pressed="false">Start</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
